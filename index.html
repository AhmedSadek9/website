<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahmed Perfumes | Ultra Luxury Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-black: #0a0a0a;
            --accent-gold: #c5a059;
            --soft-ivory: #fcfcfc;
        }

        /* 🚀 GPU Acceleration for Smoothness */
        * { backface-visibility: hidden; -webkit-font-smoothing: antialiased; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #ffffff;
            color: var(--primary-black); 
            margin: 0; overflow-x: hidden;
        }

        h1, h2, .luxury-font { font-family: 'Playfair Display', serif; }

        /* ✨ Smooth Page Transitions */
        .page-node {
            position: fixed; inset: 0; width: 100%; height: 100%;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0; visibility: hidden; z-index: 10;
            overflow-y: auto; will-change: transform, opacity;
            background: white;
        }
        .page-node.active { opacity: 1; visibility: visible; z-index: 20; transform: scale(1); }
        .page-node.exit { opacity: 0; transform: scale(1.02); }

        /* ✨ Optimized Cards */
        .perfume-card { 
            background: white; transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            padding: 25px; position: relative; border: 1px solid #f5f5f5;
            will-change: transform;
        }
        .perfume-card:hover { transform: translateY(-8px); border-color: var(--accent-gold); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }

        /* ✨ UI Elements */
        .side-panel { 
            position: fixed; top: 0; right: -100%; width: 400px; height: 100%; 
            z-index: 4800; transition: right 0.5s cubic-bezier(0.19, 1, 0.22, 1); 
            background: white; box-shadow: -10px 0 50px rgba(0,0,0,0.1); 
            will-change: right;
        }
        .side-panel.open { right: 0; }

        .toast-box { position: fixed; bottom: 20px; left: 20px; z-index: 9999; }
        .toast { background: black; color: white; padding: 12px 20px; margin-top: 10px; font-size: 11px; border-radius: 2px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }

        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95); 
            background: white; z-index: 5000; opacity: 0; pointer-events: none; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .modal-open { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: all; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 4500; display: none; opacity: 0; transition: opacity 0.4s; }
        
        .btn-lux { background: black; color: white; padding: 14px 30px; text-transform: uppercase; letter-spacing: 2px; font-size: 10px; transition: 0.3s; border: none; cursor: pointer; }
        .btn-lux:hover { background: var(--accent-gold); }

        .hidden { display: none !important; }
    </style>
</head>

    </div>

            <button type="submit" class="w-full btn-lux mt-6">Confirm Order</button>
        </form>
    </div>

            <div class="flex justify-between items-center mb-10">
                <h2 class="text-xl font-bold tracking-widest luxury-font">BAG</h2>
                <button onclick="App.closeAll()" class="text-gray-300 hover:text-black">✕</button>

            state: { category: '', gender: '', cart: [], currentPage: 'page-hero' },

            init() { 
                this.loadState(); 
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').classList.add('hidden'), 700);
                }, 1000);
                this.syncUI(); 
            },

            navigate(pageId) {
                const current = document.getElementById(this.state.currentPage);
                const next = document.getElementById(pageId);
                current.classList.add('exit');
                setTimeout(() => {
                    current.classList.remove('active', 'exit');
                    next.classList.add('active');
                    this.state.currentPage = pageId;
                    window.scrollTo(0,0);
                    if(pageId === 'page-store') this.render();
                }, 400);
            },

            setCategory(c) { this.state.category = c; this.navigate('page-gender'); },
            enterStore(g) { 
                this.state.gender = g; 
                document.getElementById('storeTitle').innerText = `${this.state.category} Collection`;
                this.navigate('page-store');
            },

            filter() {
                const q = document.getElementById('search').value.toLowerCase();
                const filtered = this.database
                    .filter(p => p.cat === this.state.category && p.gender === this.state.gender)
                    .map(p => {
                        let score = 0;
                        if(p.name.toLowerCase().includes(q)) score += 10;
                        if(p.brand.toLowerCase().includes(q)) score += 5;
                        if(p.notes.toLowerCase().includes(q)) score += 2;
                        return { ...p, score };
                    })
                    .filter(p => q === "" || p.score > 0)
                    .sort((a,b) => b.score - a.score);
                
                this.drawGrid(filtered);
            },

            render() { this.filter(); },

            drawGrid(items) {
                const grid = document.getElementById('perfumeGrid');
                grid.innerHTML = '';
                const fragment = document.createDocumentFragment();

                items.forEach((p, i) => {
                    const card = document.createElement('div');
                    card.className = 'perfume-card';
                    card.onclick = () => this.openProduct(p.id);
                    card.innerHTML = `
                        <div class="h-64 flex items-center justify-center mb-6">
                            <img src="${p.img}" loading="lazy" class="max-h-full object-contain">
                        </div>
                        <p class="text-[9px] text-[#c5a059] font-bold uppercase tracking-widest">${p.brand}</p>
                        <h3 class="text-sm font-bold uppercase mb-2">${p.name}</h3>
                        <p class="text-xs text-gray-400">$${p.price}.00</p>
                    `;
                    fragment.appendChild(card);
                    setTimeout(() => { card.style.opacity = 1; card.style.transform = "translateY(0)"; }, i * 40);
                });
                grid.appendChild(fragment);
            },

            openProduct(id) {
                const p = this.database.find(x => x.id === id);
                document.getElementById('productModal').innerHTML = `
                    <div class="bg-gray-50 flex items-center justify-center p-8"><img src="${p.img}" class="max-h-full object-contain"></div>
                    <div class="p-10 flex flex-col justify-center relative">
                        <button onclick="App.closeAll()" class="absolute top-6 right-6 text-gray-300">✕</button>
                        <h2 class="text-3xl font-bold mb-4 luxury-font">${p.name}</h2>
                        <p class="text-gray-400 text-xs mb-6 uppercase tracking-widest">${p.brand} • ${p.notes}</p>
                        <p class="text-gray-500 text-sm leading-loose mb-10">Luxury artisanal fragrance crafted with the finest ingredients.</p>
                        <div class="flex items-center gap-8 mt-auto pt-8 border-t">
                            <span class="text-xl font-light">$${p.price}</span>
                            <button onclick="App.addToCart(${p.id}, this)" class="btn-lux flex-1">Add to bag</button>
                        </div>
                    </div>`;
                document.getElementById('productModal').classList.add('modal-open');
                this.showOverlay();
            },

            addToCart(id, btn) {
                if(btn) btn.innerText = "ADDED ✓";
                const item = this.state.cart.find(x => x.id === id);
                if(item) item.qty++; else this.state.cart.push({id, qty: 1});
                this.syncUI(); this.save();
                this.showToast("Selection added to bag");
                setTimeout(() => { if(btn) btn.innerText = "ADD TO BAG"; }, 1000);
            },

            syncUI() {
                const count = this.state.cart.reduce((s, c) => s + c.qty, 0);
                document.getElementById('cartCount').innerText = count;
                document.getElementById('cartItems').innerHTML = this.state.cart.map(c => {
                    const p = this.database.find(x => x.id === c.id);
                    return `<div class="flex gap-4 items-center border-b pb-4">
                        <img src="${p.img}" class="w-16 h-16 object-contain">
                        <div class="flex-grow">
                            <p class="text-[10px] font-bold uppercase">${p.name}</p>
                            <p class="text-[10px] text-[#c5a059]">$${p.price}</p>
                            <div class="flex items-center gap-4 mt-2">
                                <button onclick="App.updateQty(${p.id}, -1)" class="w-5 h-5 border text-[10px]">-</button>
                                <span class="text-[10px]">${c.qty}</span>
                                <button onclick="App.updateQty(${p.id}, 1)" class="w-5 h-5 border text-[10px]">+</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
                const total = this.state.cart.reduce((s, c) => s + (this.database.find(x => x.id === c.id).price * c.qty), 0);
                document.getElementById('cartTotal').innerText = `$${total.toFixed(2)}`;
            },

            updateQty(id, delta) {
                const item = this.state.cart.find(x => x.id === id);
                if(item) { item.qty += delta; if(item.qty <= 0) this.state.cart = this.state.cart.filter(x => x.id !== id); }
                this.syncUI(); this.save();
            },

            openCheckout() {
                if(this.state.cart.length === 0) return;
                const total = this.state.cart.reduce((s, c) => s + (this.database.find(x => x.id === c.id).price * c.qty), 0);
                document.getElementById('checkoutSummary').innerHTML = `<div class="flex justify-between font-bold"><span>Total Order</span><span>$${total.toFixed(2)}</span></div>`;
                this.closeAll(); this.toggleModal('checkoutModal');
            },

            handleOrder(e) {
                e.preventDefault();
                alert("Order confirmed! Thank you.");
                this.state.cart = []; this.save(); location.reload();
            },

            showToast(msg) {
                const t = document.createElement('div');
                t.className = 'toast'; t.innerText = msg;
                document.getElementById('toastBox').appendChild(t);
                setTimeout(() => t.remove(), 2500);
            },

            showOverlay() { const ov = document.getElementById('overlay'); ov.style.display = 'block'; setTimeout(() => ov.style.opacity = '1', 10); },
            closeAll() { document.querySelectorAll('.side-panel, .modal').forEach(el => el.classList.remove('open', 'modal-open')); const ov = document.getElementById('overlay'); ov.style.opacity = '0'; setTimeout(() => ov.style.display = 'none', 400); },
            togglePanel(id) { document.getElementById(id).classList.add('open'); this.showOverlay(); },
            toggleModal(id) { document.getElementById(id).classList.add('modal-open'); this.showOverlay(); },
            save() { localStorage.setItem('ahmed_perfumes_v5', JSON.stringify(this.state)); },
            loadState() { const s = localStorage.getItem('ahmed_perfumes_v5'); if(s) { const data = JSON.parse(s); this.state.cart = data.cart || []; } }
        };
    </script>
</body>
</html>
